spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: sdevpoint
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/sdevpoint
    password: qwerty007
    username: postgres
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${EMAIL}
    password: ${MAIL_SMTP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  liquibase:
    change-log: classpath:/migrations/changelog/changelog-root.yml
    enabled: true

  data:
    redis:
      host: localhost
      port: 6379

  servlet:
    multipart:
      max-file-size: 6MB
      max-request-size: 10MB

app:
  scheduler:
    cleanup-drafts-cron: "0 */2 * * * * "
    cleanup-images-cron: "0 */2 * * * * "
  content-view:
    date-format: "dd.MM.yyyy HH:mm"
    timezone: "Europe/Moscow"
    preview-size: 100
  avatar:
    count: 5
    url-prefix: "/avatars/"
    file-prefix: "avatar-"
    extension: ".png"
  image-storage:
    path: "storage/images"
  email-verification:
    token-lifetime: 15m
    resend-cooldown: 1m
    rate-limit-window: 1h
    rate-limit-count: 3
  async:
    email:
      core-pool-size: 2
      max-pool-size: 5
      queue-capacity: 100
      thread-name-prefix: email-async-
      wait-for-tasks-to-complete-on-shutdown: true
      await-termination-seconds: 30

mail:
  sender: SDevPoint
  from: ${EMAIL}
  subject: "Please confirm your email"
  base-url: http://localhost:8080

management:
  endpoints:
    web:
      exposure:
        include: "health,mappings"