spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: sdevpoint
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/sdevpoint
    password: qwerty007
    username: postgres
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${EMAIL}
    password: ${MAIL_SMTP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  liquibase:
    change-log: classpath:/migrations/changelog/changelog-root.yml
    enabled: true

  data:
    redis:
      host: localhost
      port: 6379

  servlet:
    multipart:
      max-file-size: 6MB
      max-request-size: 10MB

app:
  scheduler:
    cleanup-drafts-cron: "0 */2 * * * * "

mail:
  sender: SDevPoint
  from: ${EMAIL}
  subject: "Please confirm your email"
  base-url: http://localhost:8080

management:
  endpoints:
    web:
      exposure:
        include: "health,mappings"