spring:
  servlet:
    multipart:
      max-file-size: 7MB
      max-request-size: 7MB

  config:
    import: optional:file:.env[.properties]

  application:
    name: sdevpoint

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/sdevpoint
    password: qwerty007
    username: postgres

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${EMAIL}
    password: ${MAIL_SMTP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  liquibase:
    change-log: classpath:/migrations/changelog/changelog-root.yml
    enabled: true

  data:
    redis:
      host: localhost
      port: 6379

  cache:
    type: redis

  web:
    error:
      include-exception: false
      include-stacktrace: never
      include-message: never
      whitelabel:
        enabled: false

app:
  scheduler:
    cleanup-drafts-cron: "0 */2 * * * * "
    cleanup-images-cron: "0 */2 * * * * "

  content-view:
    date-format: "dd.MM.yyyy HH:mm"
    timezone: "Europe/Moscow"
    preview-size: 100

  avatar:
    count: 5
    url-prefix: "/avatars/"
    file-prefix: "avatar-"
    extension: ".png"

  image-storage:
    path: "storage/images"

  content:
    limits:
      max-content-items-per-user: 100
      comment-cooldown: 1m

  image:
    upload:
      max-file-size: 7MB
      max-total-size-per-content: 10MB
      max-total-size-per-user: 1GB

  email-verification:
    token-lifetime: 15m
    resend-cooldown: 1m
    rate-limit-window: 1h
    rate-limit-count: 3

  async:
    email:
      core-pool-size: 2
      max-pool-size: 5
      queue-capacity: 100
      thread-name-prefix: email-async-
      wait-for-tasks-to-complete-on-shutdown: true
      await-termination-seconds: 30

  ai:
    provider: deepseek
    content:
      max-summary-input-chars: 20000
      max-explain-input-chars: 12000
      max-term-length: 100

    openrouter:
      base-url: https://openrouter.ai/api/v1
      api-key: ${OPENROUTER_API_KEY}
      model: deepseek/deepseek-v4-flash:free
      connect-timeout: 5s
      read-timeout: 30s
      temperature: 0.2
      max-tokens: 700
      site-url: http://localhost:8080
      site-title: SDevPoint

    deepseek:
      base-url: https://api.deepseek.com
      api-key: ${DEEPSEEK_API_KEY}
      model: deepseek-v4-flash
      connect-timeout: 5s
      read-timeout: 60s
      temperature: 0.7
      max-tokens: 1000

    prompts:
      summary-system-prompt-path: prompts/summary-system.ftlh
      summary-user-prompt-path: prompts/summary-user.ftlh
      explain-term-system-prompt-path: prompts/explain-term-system.ftlh
      explain-term-user-prompt-path: prompts/explain-term-user.ftlh

    usage-limit:
      summary:
        cooldown: 1m
        daily-limit: 10

      explain-term:
        cooldown: 30s
        daily-limit: 30

  cache:
    prefix-cache-name: "sdevpoint:cache:"
    default-ttl: 30m
    ai-summary:
      cache-name: "aiSummary"
      ttl: 1h

mail:
  sender: SDevPoint
  from: ${EMAIL}
  subject: "Please confirm your email"
  base-url: http://localhost:8080

management:
  endpoints:
    web:
      exposure:
        include: "health,mappings"